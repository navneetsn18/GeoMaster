app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-replace-in-prod-abcde}
    expiration: 604800000  # 7 days in ms
  upload-path: ${UPLOAD_PATH:/app/uploads}

github:
  pat: ${GITHUB_PAT:}
  repo: ${GITHUB_REPO:}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geomaster}?sslmode=${DB_SSL:disable}}
    username: ${DB_USER:geomaster}
    password: ${DB_PASS:geomaster123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

logging:
  level:
    com.geomaster: DEBUG
    org.springframework.security: INFO
