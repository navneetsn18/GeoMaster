services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: geomaster
      POSTGRES_USER: geomaster
      POSTGRES_PASSWORD: geomaster123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geomaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: geomaster
      DB_USER: geomaster
      DB_PASS: geomaster123
      JWT_SECRET: change-this-in-production-256-bit-key-abcdefghijklmnop
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
